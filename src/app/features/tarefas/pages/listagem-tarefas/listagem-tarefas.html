<section>
  <h2>Tarefas</h2>

  <mat-form-field>
    <mat-label>Input</mat-label>
    <input matInput />
  </mat-form-field>

  <div>
    <button matButton="filled">Nova tarefa</button>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Tarefa</mat-card-title>
      <mat-card-subtitle>Pendente</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>Descrição da tarfa</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button="filled">Editar</button>
      <button mat-button="outlined">Remover</button>
    </mat-card-actions>
  </mat-card>
</section>
