<section>
  <h2>Criação de tarefa</h2>

  <form>
    <mat-form-field>
      <mat-label>Input</mat-label>
      <input matInput placeholder="Digite o título da tarefa" />
    </mat-form-field>

    <mat-form-field>
      <textarea matInput placeholder="Digite uma descrição para a taarefa"></textarea>
      <input matInput />
    </mat-form-field>

    <div>
      <button type="button" matButton="outlined" routerLink="/tarefas">Cancelar</button>
      <button type="submit" matButton="filled">Salvar</button>
    </div>
  </form>
</section>
